<html style="background-color: var(--secondary-color);">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width" initial-scale="1.0" lang="de"/>
  <title>Vinzenz Krüger</title>
  <link rel="stylesheet" href="style.css">
  <script src="functions.js" defer></script>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">  

  <script src="https://kit.fontawesome.com/7fbf6355c1.js" crossorigin="anonymous"></script>
</head>

<body onscroll="id_check()" id="body" style="display: grid;">
    <header>
        <h1 id="titel">Vinzenz Krüger</h1>
        <div id="seiten" class="sections">
            <button title="Startseite" onclick="to_id()" class="menu on">
                <i class="fa-solid fa-house"></i>
            </button>
            <button title="Über mich" onclick="to_id()" class="menu">
                <i class="fa-solid fa-circle-info"></i>
            </button>
            <button title="Ergebnisse" onclick="to_id()" class="menu">
                <i class="fa-solid fa-trophy"></i>
            </button>
            <button title="Soziale Medien" onclick="to_id()" class="menu">
                <i class="fa-solid fa-share"></i>
            </button>
            <button title="Kontakt" onclick="to_id()" class="menu">
                <i class="fa-solid fa-address-book"></i>
            </button>
        </div>
        <a title="Sprache wechseln" class="lang" href="index.html" style="overflow: visible;">🇬🇧</a>
    </header>

    <div class="seite" style="display: flex; align-items: center; justify-content: center;">
        <video class="bg-video" autoplay muted loop>
            <source src="Maribor Gopro.mp4" type="video/mp4">
        </video>

        <p class="overlay" style="padding-top: 13vh; text-align: center; align-content: start; font-size: 4.5vw;">
            „Hallo,<br>
            mein Name ist Vinzenz Krüger<br>
            und ich bin <b>Downhill-Rennfahrer</b>.“
        </p>
    </div>

    <div class="seite vorstellung">
        <img style="width: 100%; max-height: 90%;" src="Ilmenau Jump 2.jpg">

        <div style="display: flex; flex-direction: column; top: 0; width: auto; justify-content: center; background-color: transparent; padding: 10px;">
            <h2 style="justify-content: start;">Ich bin …</h2>
            <ul style="margin-left: 10px;">
                <li>16 Jahre alt</li>
                <li>leidenschaftlicher Sportler <i class="fa-solid fa-dumbbell"></i></li>
            </ul>
            <p style="margin: 0; margin-left: 30;">
                …und meine Lieblingsstrecke ist „The Straight One“ in Innsbruck!
            </p>
        </div>
    </div>

    <div class="seite erfolge">
        <button class="flip_chart" style="position: relative; background-image: url(Bellwald\ 1.jpg); max-height: 90%;">
            <jahr class="year">
                Ergebnisse<br>
                2026 – U19 Pro
            </jahr>
            <p class="text hidden" style="position: absolute; top: 0; font-size: 2.5vw;">
                <u>European DH Cup</u><br>
                #1: 46.<br>
                #3: 17.<br>

                <u>IXS DH Cup</u><br>
                #1: 9.<br>
            </p>
        </button>

        <button class="flip_chart" style="position: relative; background-image: url(Ilmenau\ Stage\ dive.jpg); max-height: 90%;">
            <jahr class="year">
                Ergebnisse<br>
                2025 – U17 Pro
            </jahr>

            <p class="text hidden" style="position: absolute; top: 0; font-size: 2.5vw;">
                <u>IXS DH Cup</u><br>
                Gesamtwertung: 2.<br>
                #2: 2.<br>
                #4: 2.<br>
                #5: 3.<br><br>

                <u>Rookies Cup</u><br>
                Gesamtwertung: 3.<br>
                #2: 1.<br>
                #5: 3.<br><br>

                <u>European DH Cup</u><br>
                #6: 20.
            </p>
        </button>
    </div>

    <div class="seite sm">
        <div style="max-height: 80%; top: 0;">
            <video controls preload="auto" src="Schladders2.mov"></video>
        </div>

        <div class="icons">
            <a class="contact-icons" href="https://www.instagram.com/vinzenz_kruger/">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a class="contact-icons" href="https://www.tiktok.com/@vinzenz_kruger">
                <i class="fa-brands fa-tiktok"></i>
            </a>

            <a class="contact-icons copy" title="+49 1573 9070908" onclick="copytext(this)">
                <i class="fa-solid fa-phone"></i>
            </a>

            <a class="contact-icons copy" title="vinzenzkrueger@gmx.de" onclick="copytext(this)">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>
    </div>

    <div class="seite sponsoren">

        <div style="display: flex; flex-direction: column; top: 0; justify-content: center;">

                <p style="text-align:center; font-size:2vh; top: 10px;">
                    <i class="fa-solid fa-phone"></i>

                </p>

                <p style="text-align:center; font-size:2vh;">
                    <i class="fa-solid fa-envelope"></i>
                    vinzenzkrueger@gmx.de
                </p>
            </div>
        </div>
        -->

        <h2 style="margin-bottom: 10px;">Sponsoren</h2>

        <a class="sponsor" href="https://www.propain-bikes.com/">
            Propain Bicycles
        </a>
    </div>
